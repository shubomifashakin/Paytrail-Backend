name: Deploy to staging
on:
  push:
    branches:
      - cicd

  workflow_dispatch:

jobs:
  migrations:
    name: "Apply Prisma Migrations"
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      migration_applied: ${{ steps.prisma-migrations.outputs.applied }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js environment
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "24.11.0"
          cache: "npm"

      - name: "Install Dependencies"
        run: npm ci

      - name: "Apply Prisma Migrations"
        id: prisma-migrations
        run: |
          npx prisma migrate deploy
          echo "applied=true" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: ${{secrets.DATABASE_URL}}

  build:
    name: "Build & Push Docker Image"
    needs: migrations
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:latest,${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:buildcache,mode=max

  deploy:
    name: Deploy to Staging
    needs: [build]
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Backup Current Configs
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.REMOTE_USER }}/projects/paytrail

            mkdir -p backups

            if [ -f docker-compose.yml ]; then
              if [ ! -f backups/docker-compose.yml ] || ! cmp -s docker-compose.yml backups/docker-compose.yml; then
                cp docker-compose.yml backups/
                echo "Backed up docker-compose.yml"
              fi
            fi

            if [ -f redis.conf ]; then
              if [ ! -f backups/redis.conf ] || ! cmp -s redis.conf backups/redis.conf; then
                cp redis.conf backups/
                echo "Backed up redis.conf"
              fi
            fi

            echo "Pre deployment configuration backed up to backups/"

      - name: Copy the Ops Files to the Server
        uses: Burnett01/rsync-deployments@7.1.0
        with:
          switches: -avr --delete --exclude='.env*'
          path: ./ops/
          remote_path: /home/${{ secrets.REMOTE_USER }}/projects/paytrail/
          remote_host: ${{ secrets.HOSTNAME }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: "Deploy and Verify New Services"
        id: deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.REMOTE_USER }}/projects/paytrail

            echo "Pulling new Paytrail Image"

            if ! docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:latest; then
                echo "Failed to pull Docker image"
                exit 1
            fi

            echo 'Starting new containers'
            if docker-compose up -d --wait --wait-timeout 120; then
              echo "Services are healthy"

              echo "updating last deployment sha"
              echo "${{ github.sha }}" > .last_deployment_sha

              echo "Removing dangling Docker images"
              docker image prune -f

              exit 0
            else
             echo "Services failed health check"

             echo "Paytrail Container Logs"
             docker-compose logs paytrail --tail=100

             echo "Redis Container Logs"
             docker-compose logs paytrail_redis --tail=50
              
             exit 1
            fi

      - name: "Rollback on Deployment Failure"
        if: failure() && steps.deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.REMOTE_USER }}/projects/paytrail

            echo "=== INITIATING ROLLBACK ==="

            echo "Stopping failed containers..."
            docker-compose down

            if [ -f backups/docker-compose.yml ]; then
              echo "Restoring docker-compose.yml from backup"
              cp backups/docker-compose.yml . || true
            fi

            if [ -f backups/redis.conf ]; then
              echo "Restoring redis.conf from backup"
              cp backups/redis.conf . || true
            fi

            if [ -f .last_deployment_sha ]; then
              PREV_SHA=$(cat .last_deployment_sha)

              echo "Pulling previous image: $PREV_SHA"
              docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:$PREV_SHA || true
              
              echo "Replacing all paytrail-backend:latest with paytrail-backend:$PREV_SHA in docker-compose.yml"

              sed -i "s|paytrail-backend:latest|paytrail-backend:$PREV_SHA|g" docker-compose.yml
            else
              echo "No previous deployment was found!"
            fi

            echo "Starting previous stable version..."

            if ! docker-compose up -d --wait --wait-timeout 120; then
              echo "Failed to start previous stable version"

              docker-compose logs paytrail --tail=100
              docker-compose logs paytrail_redis --tail=50
              exit 1
            fi

            echo "=== ROLLBACK COMPLETED ==="
            docker-compose ps

            echo 'Clean ups'
            docker image prune -f

  rollback-migrations:
    name: "Rollback Database Migrations"
    needs: [migrations, deploy]
    if: failure() && needs.migrations.outputs.migration_applied == 'true'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js environment
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "24.11.0"
          cache: "npm"

      - name: "Install Dependencies"
        run: npm ci

      - name: "Rollback Migrations"
        run: |
          echo "⚠️  MANUAL INTERVENTION REQUIRED ⚠️"
          echo "Deployment failed. Database migrations may need to be rolled back."
          echo "Please review the migration state and rollback manually if needed."
          echo "Current migration status:"
          npx prisma migrate status || true
        env:
          DATABASE_URL: ${{secrets.DATABASE_URL}}
