name: CI Workflow

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  tests:
    name: "Run Unit Tests"
    defaults:
      run:
        shell: bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        name: "Checkout Repository"

      - name: "Install Dependencies"
        run: npm ci

      - name: "Run Tests"
        run: npm run test

  lint:
    name: "Run Linter"
    defaults:
      run:
        shell: bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        name: "Checkout Repository"

      - name: "Install Dependencies"
        run: npm ci

      - name: "Run Linter"
        run: npm run lint
