name: Continuous Deployment Workflow

on:
  push:
    branches:
      - master
    paths:
      - prisma/**
      - src/**
      - ops/**

jobs:
  test:
    name: "Run Tests"
    environment: development
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{secrets.DATABASE_URL}}
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_123
          POSTGRES_DB: paytrail_postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        shell: bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        name: "Checkout Repository"

      - name: Setup Node.js environment
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "22.12.0"
          cache: "npm"

      - name: "Write .env.test file"
        run: echo "${{ secrets.ENV_TEST_FILE }}" > .env.test

      - name: "Install Dependencies"
        run: npm ci

      - name: "Prisma Migrations"
        run: npx prisma migrate dev

      - name: "Run Tests"
        run: npm run test

  build:
    name: "Build & Push Docker Image"
    environment: production
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        name: "Checkout repository"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: "Build and Push"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:latest,${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:buildcache,mode=max

  migrations:
    name: "Apply Prisma Migrations"
    needs: build
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        name: "Checkout repository"

      - name: "Setup Node.js environment"
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "24.11.0"
          cache: "npm"

      - name: "Install Dependencies"
        run: npm ci

      - name: "Apply Prisma Migrations"
        id: prisma-migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{secrets.DATABASE_URL}}

  deploy:
    name: "Deploy to Production"
    needs: migrations
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        name: "Checkout repository"

      - name: "Copy the Ops Files to the Server"
        uses: Burnett01/rsync-deployments@7.1.0
        with:
          switches: -avr --delete --exclude='.env*' --exclude='certs/' --exclude='secrets/'
          path: ./ops/
          remote_path: /var/app/paytrail/
          remote_host: ${{ secrets.HOSTNAME }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: "Start the New Paytrail Service"
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/app/paytrail

            echo "Pulling new Image"

            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/paytrail-backend:latest

            echo "Stopping old Paytrail Service"

            docker-compose stop paytrail

            echo 'Removing old Paytrail Service'

            docker-compose rm -f paytrail

            echo "Starting new Paytrail Service"

            docker-compose up -d paytrail

            echo "Waiting for paytrail service to be healthy..."
            RETRY_COUNT=0
            MAX_RETRIES=15
            until docker-compose ps paytrail | grep -q "healthy" || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              echo "Waiting... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 2
              RETRY_COUNT=$((RETRY_COUNT + 1))
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Service failed to become healthy"
              docker-compose logs paytrail --tail=50
              exit 1
            fi
            echo "Service is healthy"

      - name: "Remove old Image"
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/app/paytrail

            docker image prune -f
